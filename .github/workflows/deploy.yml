name: Deploy SampahKu to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 52.221.236.111
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/sampahku
            git pull origin main
            docker build -t sampahku:latest .

            docker stop sampahku-app || true
            docker rm sampahku-app || true

            docker run -d \
              --name sampahku-app \
              --restart unless-stopped \
              -p 80:5000 \
              -e DB_HOST=sampahku-db.cfyk8wgyqqvr.ap-southeast-1.rds.amazonaws.com \
              -e DB_NAME=sampahku-db \
              -e DB_USER=postgres \
              -e DB_PASS=Mariobros1 \
              -e S3_BUCKET=sampahku-uploads-zill \
              -e AWS_REGION=ap-southeast-1 \
              -e SECRET_KEY=${{ secrets.SECRET_KEY }} \
              sampahku:latest

            echo "✅ Deploy selesai!"
            docker ps | grep sampahku